# Security-hardened Docker Compose configuration
services:
  db:
    build: 
      context: ./dbserver
      dockerfile: Dockerfile
    container_name: 16498040_7009_dbserver_secure
    hostname: db.cyber23.test
    restart: unless-stopped
    
    # Remove privileged mode for security
    privileged: false
    
    # Security options
    security_opt:
      - no-new-privileges:true
      - apparmor:docker-default
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Environment variables
    environment:
      - MYSQL_ROOT_PASSWORD_FILE=/run/secrets/db_root_password
      - MYSQL_DATABASE=7009db
      - MYSQL_USER=wwwclient23
      - MYSQL_PASSWORD_FILE=/run/secrets/db_user_password
    
    # Docker secrets for sensitive data
    secrets:
      - db_root_password
      - db_user_password
    
    # Network configuration
    networks:
      app_network:
        ipv4_address: 203.0.113.201
    
    # Persistent storage
    volumes:
      - db_data:/var/lib/mysql
      - db_logs:/var/log/mysql
      - /etc/localtime:/etc/localtime:ro
    
    # Health check
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      timeout: 10s
      retries: 5
      interval: 30s
      start_period: 60s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=database"

  web:
    build:
      context: ./webserver
      dockerfile: Dockerfile.hardened
    container_name: 16498040_7009_webserver_secure
    hostname: www.cyber23.test
    restart: unless-stopped
    
    # Port mapping - only HTTP port exposed
    ports:
      - "80:80"
    
    # Security options
    security_opt:
      - no-new-privileges:true
      - apparmor:docker-default
    
    # Capability management
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - NET_RAW
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    
    # Network configuration
    networks:
      app_network:
        ipv4_address: 203.0.113.200
    
    # Host resolution
    extra_hosts:
      - "db.cyber23.test:203.0.113.201"
    
    # Read-only root filesystem with writable mounts
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=100m
      - /run:rw,noexec,nosuid,size=100m,uid=1001,gid=1001
      - /var/cache/nginx:rw,noexec,nosuid,size=50m
      - /var/lib/nginx/tmp:rw,noexec,nosuid,size=50m,uid=1001,gid=1001
    
    # Volumes for writable areas
    volumes:
      - web_logs:/var/log/nginx
      - /etc/localtime:/etc/localtime:ro
    
    # Dependencies
    depends_on:
      db:
        condition: service_healthy
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      timeout: 3s
      retries: 3
      interval: 30s
      start_period: 30s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=webserver"

# Secure network configuration
networks:
  app_network:
    driver: bridge
    ipam:
      config:
        - subnet: 203.0.113.0/24
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.driver.mtu: "1500"

# Named volumes for data persistence
volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/mysql
  db_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./logs/mysql
  web_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./logs/nginx

# Docker secrets for sensitive data
secrets:
  db_root_password:
    file: ./secrets/db_root_password.txt
  db_user_password:
    file: ./secrets/db_user_password.txt
