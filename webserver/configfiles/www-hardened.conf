[www]
user = webuser
group = webgroup

listen = 127.0.0.1:9000

; FPM error log - redirect to writable location
php_admin_value[error_log] = /var/log/nginx/fpm_errors.log

pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 500

; Security settings
php_admin_value[expose_php] = off
php_admin_value[allow_url_fopen] = off
php_admin_value[allow_url_include] = off
php_admin_value[file_uploads] = off
php_admin_value[max_execution_time] = 30
php_admin_value[max_input_time] = 30
php_admin_value[memory_limit] = 128M
php_admin_value[post_max_size] = 1M
php_admin_value[upload_max_filesize] = 1M

; Disable dangerous functions
php_admin_value[disable_functions] = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source

; Error handling
php_admin_value[display_errors] = off
php_admin_value[log_errors] = on
php_admin_value[error_log] = /var/log/nginx/php_errors.log

; FPM settings
catch_workers_output = yes
decorate_workers_output = no

; Session security
php_admin_value[session.cookie_httponly] = 1
php_admin_value[session.use_only_cookies] = 1
php_admin_value[session.cookie_secure] = 1
php_admin_value[session.cookie_samesite] = Strict

clear_env = no
