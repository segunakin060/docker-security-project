[PHP]
; Security hardened PHP configuration

; Basic settings
engine = On
short_open_tag = Off
precision = 14
output_buffering = 4096
zlib.output_compression = Off
implicit_flush = Off
unserialize_callback_func =
serialize_precision = -1
zend.enable_gc = On
zend.exception_ignore_args = On

; Security settings
expose_php = Off
allow_url_fopen = Off
allow_url_include = Off
file_uploads = Off

; Resource limits
max_execution_time = 30
max_input_time = 30
memory_limit = 128M
post_max_size = 1M
upload_max_filesize = 1M
max_file_uploads = 0

; Error handling
display_errors = Off
display_startup_errors = Off
log_errors = On
log_errors_max_len = 1024
ignore_repeated_errors = Off
ignore_repeated_source = Off
report_memleaks = On
error_log = /var/log/nginx/php_errors.log

; Data handling
variables_order = "GPCS"
request_order = "GP"
register_argc_argv = Off
auto_globals_jit = On

; Paths and directories
doc_root = /var/www/html
user_dir =
enable_dl = Off

; File uploads (disabled for security)
file_uploads = Off

; Session configuration
session.save_handler = files
session.use_strict_mode = 1
session.use_cookies = 1
session.use_only_cookies = 1
session.name = PHPSESSID
session.auto_start = 0
session.cookie_lifetime = 0
session.cookie_path = /
session.cookie_domain =
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = "Strict"
session.serialize_handler = php
session.gc_probability = 1
session.gc_divisor = 1000
session.gc_maxlifetime = 1440

; Disable dangerous functions
; WARNING: eval and shell_exec enabled for CTF challenge - NOT for production!
disable_functions = exec,passthru,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source,create_function,assert

; Miscellaneous
realpath_cache_size = 4096k
realpath_cache_ttl = 120

[Date]
date.timezone = UTC

[MySQLi]
mysqli.max_persistent = -1
mysqli.allow_persistent = On
mysqli.max_links = -1
mysqli.default_port = 3306
mysqli.default_socket =
mysqli.default_host =
mysqli.default_user =
mysqli.default_pw =
mysqli.reconnect = Off
