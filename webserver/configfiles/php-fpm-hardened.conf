; Global PHP-FPM configuration for security hardened environment
; This file configures the main PHP-FPM process

[global]
; Pid file location (in writable tmpfs)
pid = /run/php/php-fpm.pid

; Force error log to syslog to avoid read-only filesystem issues
error_log = syslog

; Log level for error messages
log_level = error

; Emergency restart threshold
emergency_restart_threshold = 10
emergency_restart_interval = 1m

; Process control timeout
process_control_timeout = 10s

; Maximum number of FPM processes
process.max = 128

; Process priority (lower numbers = higher priority)
process.priority = -19

; Send FPM to background
daemonize = yes

; Set open file descriptor rlimit
rlimit_files = 131072

; Set max core size rlimit
rlimit_core = 0

; Include pool configurations
include = /etc/php82/php-fpm.d/*.conf
